<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokens/Watt/User — Thermodynamic + Quantum Engine | ΔTOM</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,900&f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet">
<style>
/* ─── ATOM DESIGN SYSTEM ─────────────────────────────────────────────── */
/* Art direction: ATOM AI brand → dark, precise, quantum-tech aesthetic
   Palette: near-black base, electric cyan (#00E5FF) accent, deep space surfaces
   Typography: Cabinet Grotesk display + Satoshi body — bold engineering feel
   Density: data-dense, monospace accents for numbers/code */

:root {
  /* ATOM Brand Surfaces */
  --color-bg:             #060810;
  --color-surface:        #0b0e1a;
  --color-surface-2:      #101422;
  --color-surface-offset: #141828;
  --color-surface-dynamic:#1c2035;
  --color-divider:        #1e2438;
  --color-border:         #252a40;

  /* Text */
  --color-text:           #e8eaf2;
  --color-text-muted:     #7a82a0;
  --color-text-faint:     #3d4460;
  --color-text-inverse:   #060810;

  /* ATOM Primary — Electric Cyan */
  --color-primary:        #00d4e8;
  --color-primary-hover:  #00b8cc;
  --color-primary-active: #009aab;
  --color-primary-highlight: rgba(0,212,232,0.08);
  --color-primary-glow:   rgba(0,212,232,0.25);

  /* Accent accents */
  --color-success:        #00e5a0;
  --color-success-dim:    rgba(0,229,160,0.12);
  --color-warning:        #f5a623;
  --color-warning-dim:    rgba(245,166,35,0.12);
  --color-error:          #ff4d6a;
  --color-error-dim:      rgba(255,77,106,0.12);
  --color-purple:         #9b6fff;
  --color-purple-dim:     rgba(155,111,255,0.12);

  /* Type */
  --font-display: 'Cabinet Grotesk', 'Helvetica Neue', sans-serif;
  --font-body:    'Satoshi', 'Inter', sans-serif;
  --font-mono:    'Courier New', 'Fira Code', monospace;

  /* Fluid Type */
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.8125rem,0.75rem + 0.3vw,  0.9375rem);
  --text-base: clamp(0.9375rem,0.875rem+ 0.3vw,  1.0625rem);
  --text-lg:   clamp(1.0625rem,0.95rem + 0.6vw,  1.375rem);
  --text-xl:   clamp(1.375rem, 1.1rem  + 1.1vw,  2rem);
  --text-2xl:  clamp(1.875rem, 1.2rem  + 2.5vw,  3.25rem);

  /* Spacing */
  --space-1: 0.25rem; --space-2: 0.5rem;  --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem;

  /* Radius */
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
  --radius-xl: 16px; --radius-full: 9999px;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
  --shadow-glow: 0 0 24px var(--color-primary-glow);

  /* Transitions */
  --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);

  /* Content widths */
  --content-default: 1100px;
  --content-wide: 1360px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100dvh;
}
img, svg { display: block; max-width: 100%; }
button { cursor: pointer; font-family: inherit; }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
::selection { background: var(--color-primary-highlight); color: var(--color-text); }

/* ─── SCANLINE / GRAIN OVERLAY ───────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
}

/* ─── HEADER ─────────────────────────────────────────────────────────── */
.header {
  position: relative;
  background: linear-gradient(180deg, #08091a 0%, var(--color-bg) 100%);
  border-bottom: 1px solid var(--color-divider);
  padding: var(--space-10) var(--space-8) var(--space-8);
  text-align: center;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,212,232,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
  opacity: 0.35;
}

/* ATOM Logo SVG */
.atom-logo {
  display: inline-flex; align-items: center; gap: var(--space-3);
  margin-bottom: var(--space-5);
}
.atom-logo svg { width: 36px; height: 36px; }
.atom-logo-text {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 900;
  color: var(--color-text);
  letter-spacing: -0.02em;
}
.atom-logo-text span { color: var(--color-primary); }

.badge {
  display: inline-flex; align-items: center; gap: var(--space-2);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  letter-spacing: 0.12em;
  color: var(--color-primary);
  border: 1px solid rgba(0,212,232,0.25);
  background: rgba(0,212,232,0.05);
  padding: 3px var(--space-3);
  border-radius: var(--radius-full);
  margin-bottom: var(--space-5);
  text-transform: uppercase;
}
.badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--color-primary);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--color-primary);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

.header h1 {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: 900;
  color: var(--color-text);
  line-height: 1.05;
  letter-spacing: -0.03em;
  margin-bottom: var(--space-3);
  position: relative;
}
.header h1 .highlight { color: var(--color-primary); }
.header h1 .dim { color: var(--color-text-muted); font-weight: 400; font-size: 0.6em; display: block; letter-spacing: 0.05em; margin-top: var(--space-1); font-family: var(--font-body); }

.header p.sub {
  color: var(--color-text-muted);
  font-size: var(--text-sm);
  letter-spacing: 0.03em;
  max-width: 560px;
  margin: 0 auto;
  position: relative;
}

/* ─── NAV ────────────────────────────────────────────────────────────── */
nav {
  display: flex;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  overflow-x: auto;
  position: sticky;
  top: 0;
  z-index: 100;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }
nav button {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--color-text-muted);
  padding: var(--space-4) var(--space-5);
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  transition: color var(--transition), border-color var(--transition), background var(--transition);
  position: relative;
}
nav button.active {
  color: var(--color-primary);
  border-bottom-color: var(--color-primary);
  background: rgba(0,212,232,0.04);
}
nav button:hover:not(.active) {
  color: var(--color-text);
  background: rgba(255,255,255,0.03);
}
.nav-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  padding: 0 var(--space-4);
  border-left: 1px solid var(--color-divider);
}
.nirmata-tag {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  letter-spacing: 0.05em;
  font-family: var(--font-mono);
  text-transform: uppercase;
}
.nirmata-tag span { color: var(--color-primary); opacity: 0.7; }

/* ─── SECTIONS ───────────────────────────────────────────────────────── */
.section {
  display: none;
  padding: var(--space-10) var(--space-8);
  max-width: var(--content-wide);
  margin: 0 auto;
}
.section.active { display: block; }

/* ─── TYPOGRAPHY ─────────────────────────────────────────────────────── */
h2 {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 900;
  color: var(--color-text);
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: var(--space-2);
}
h2 .accent { color: var(--color-primary); }
h3 {
  font-size: var(--text-xs);
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--color-primary);
  text-transform: uppercase;
  margin: var(--space-6) 0 var(--space-4);
}
p.desc {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  line-height: 1.75;
  margin-bottom: var(--space-6);
  max-width: 72ch;
}

/* ─── GRID LAYOUTS ───────────────────────────────────────────────────── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); margin: var(--space-5) 0; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--space-5); margin: var(--space-5) 0; }

/* ─── CARDS ──────────────────────────────────────────────────────────── */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-divider);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
}
.card.accent-green { border-color: rgba(0,229,160,0.2); background: linear-gradient(135deg, var(--color-surface) 0%, rgba(0,229,160,0.03) 100%); }
.card.accent-gold  { border-color: rgba(245,166,35,0.2);  background: linear-gradient(135deg, var(--color-surface) 0%, rgba(245,166,35,0.03) 100%); }
.card.accent-cyan  { border-color: rgba(0,212,232,0.2);   background: linear-gradient(135deg, var(--color-surface) 0%, rgba(0,212,232,0.04) 100%); }

.card-label {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  letter-spacing: 0.12em;
  color: var(--color-text-faint);
  text-transform: uppercase;
  margin-bottom: var(--space-2);
}
.card-val {
  font-family: var(--font-display);
  font-size: 2.6rem;
  font-weight: 900;
  color: var(--color-primary);
  line-height: 1;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums lining-nums;
}
.card.accent-green .card-val { color: var(--color-success); }
.card.accent-gold  .card-val { color: var(--color-warning); }
.card-sub {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  margin-top: var(--space-2);
  line-height: 1.5;
}

/* ─── SLIDER ROWS ────────────────────────────────────────────────────── */
.slider-block {
  background: var(--color-surface);
  border: 1px solid var(--color-divider);
  border-radius: var(--radius-lg);
  padding: var(--space-5) var(--space-6);
}
.slider-row { display: flex; align-items: center; gap: var(--space-4); margin: var(--space-3) 0; }
.slider-row:first-of-type { margin-top: 0; }
.slider-row label {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  letter-spacing: 0.02em;
  width: 200px;
  flex-shrink: 0;
}
.slider-row input[type=range] {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--color-divider);
  border-radius: var(--radius-full);
  outline: none;
  cursor: pointer;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--color-primary);
  box-shadow: 0 0 8px var(--color-primary-glow);
  cursor: pointer;
}
.slider-row input[type=range]::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--color-primary);
  box-shadow: 0 0 8px var(--color-primary-glow);
  cursor: pointer;
  border: none;
}
.slider-row .val {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--color-primary);
  font-weight: 700;
  width: 72px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ─── RESULT HERO ────────────────────────────────────────────────────── */
.result-hero {
  position: relative;
  text-align: center;
  padding: var(--space-12) var(--space-8);
  margin: var(--space-6) 0;
  background: var(--color-surface);
  border: 1px solid rgba(0,212,232,0.2);
  border-radius: var(--radius-xl);
  overflow: hidden;
}
.result-hero::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(0,212,232,0.05) 0%, transparent 65%);
  pointer-events: none;
}
.result-number {
  font-family: var(--font-display);
  font-size: clamp(4rem, 8vw, 7rem);
  font-weight: 900;
  color: var(--color-primary);
  line-height: 1;
  letter-spacing: -0.04em;
  text-shadow: 0 0 40px rgba(0,212,232,0.4), 0 0 80px rgba(0,212,232,0.15);
  font-variant-numeric: tabular-nums lining-nums;
  position: relative;
}
.result-unit {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: var(--space-3);
  position: relative;
}
.result-delta {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  margin-top: var(--space-4);
  font-family: var(--font-mono);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-success);
  background: var(--color-success-dim);
  border: 1px solid rgba(0,229,160,0.25);
  padding: var(--space-1) var(--space-4);
  border-radius: var(--radius-full);
  position: relative;
}

/* ─── ALGO TRACE ─────────────────────────────────────────────────────── */
.algo-trace {
  background: #05090f;
  border: 1px solid rgba(0,229,160,0.12);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  line-height: 2;
  margin: var(--space-6) 0;
  position: relative;
  overflow: hidden;
}
.algo-trace::before {
  content: 'ALGORITHM TRACE';
  position: absolute; top: var(--space-3); right: var(--space-4);
  font-size: 10px; letter-spacing: 0.15em;
  color: var(--color-text-faint);
}
.trace-step { color: var(--color-text-faint); padding-top: var(--space-3); border-top: 1px solid var(--color-divider); margin-top: var(--space-2); }
.trace-step:first-child { border-top: none; margin-top: 0; padding-top: 0; }
.trace-calc { color: var(--color-primary); }
.trace-result { color: var(--color-success); font-weight: 700; }

/* ─── EQUATION BOXES ─────────────────────────────────────────────────── */
.eq-box {
  background: var(--color-surface);
  border: 1px solid var(--color-divider);
  border-radius: var(--radius-lg);
  padding: var(--space-5) var(--space-6);
  margin: var(--space-4) 0;
}
.eq-box .eq-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--color-primary);
  text-transform: uppercase;
  margin-bottom: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--color-divider);
}
.eq {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--color-text);
  line-height: 2;
}
.eq .var { color: var(--color-primary); }
.eq .comment { color: var(--color-text-faint); font-size: var(--text-xs); }
.eq .result { color: var(--color-success); font-weight: 700; }

/* ─── INFO / WARNING BOXES ───────────────────────────────────────────── */
.info-box {
  background: rgba(0,212,232,0.04);
  border: 1px solid rgba(0,212,232,0.2);
  border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-5);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  margin: var(--space-4) 0;
  line-height: 1.75;
}
.info-box strong { color: var(--color-primary); }
.warning-box {
  background: rgba(245,166,35,0.04);
  border: 1px solid rgba(245,166,35,0.2);
  border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-5);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  margin: var(--space-4) 0;
  line-height: 1.75;
}
.warning-box strong { color: var(--color-warning); }

/* ─── TABLE ──────────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; margin: var(--space-5) 0; border-radius: var(--radius-lg); border: 1px solid var(--color-divider); }
table { width: 100%; border-collapse: collapse; font-size: var(--text-xs); }
th {
  background: var(--color-surface-offset);
  color: var(--color-text-faint);
  padding: var(--space-3) var(--space-4);
  text-align: left;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
  border-bottom: 1px solid var(--color-divider);
}
td {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--color-text-muted);
  vertical-align: middle;
  font-size: var(--text-xs);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.015); }
tr.winner td { color: var(--color-text); background: rgba(0,212,232,0.03); }
tr.winner td:first-child { border-left: 2px solid var(--color-primary); }

.tick  { color: var(--color-success); font-size: 1em; }
.cross { color: var(--color-error);   font-size: 1em; }
.partial { color: var(--color-warning); font-size: 0.85em; }

/* ─── PILLS / BADGES ─────────────────────────────────────────────────── */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  vertical-align: middle;
  margin-left: 4px;
}
.pill.best    { background: rgba(0,229,160,0.12); color: var(--color-success);  border: 1px solid rgba(0,229,160,0.3); }
.pill.good    { background: rgba(0,212,232,0.12); color: var(--color-primary); border: 1px solid rgba(0,212,232,0.3); }
.pill.weak    { background: rgba(255,77,106,0.1);  color: var(--color-error);   border: 1px solid rgba(255,77,106,0.3); }
.pill.partial { background: rgba(245,166,35,0.1);  color: var(--color-warning); border: 1px solid rgba(245,166,35,0.3); }

/* ─── RATIONALE CARDS ────────────────────────────────────────────────── */
.reason-card {
  background: var(--color-surface);
  border: 1px solid var(--color-divider);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  position: relative;
  overflow: hidden;
}
.reason-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--color-primary), var(--color-success));
  opacity: 0.5;
}
.reason-num {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 900;
  color: var(--color-text-faint);
  line-height: 1;
  margin-bottom: var(--space-2);
  letter-spacing: -0.04em;
}
.reason-title {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 800;
  color: var(--color-text);
  margin-bottom: var(--space-3);
}
.reason-body {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  line-height: 1.75;
}

/* ─── FOOTER ─────────────────────────────────────────────────────────── */
footer {
  border-top: 1px solid var(--color-divider);
  padding: var(--space-6) var(--space-8);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  flex-wrap: wrap;
}
.footer-brand {
  display: flex; align-items: center; gap: var(--space-2);
  font-family: var(--font-display);
  font-weight: 800;
  font-size: var(--text-sm);
  color: var(--color-text-faint);
}
.footer-brand span { color: var(--color-primary); }

<script>
const state = {
  monthlyQueries: 1500,
  avgTokensPerQuery: 600,
  whPerQuery: 1.0,
  semanticCacheHit: 18,
  routingEfficiency: 10,
  egressReduction: 5
};

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const sec = document.getElementById('sec-' + id);
  const btn = document.querySelector('[data-sec="' + id + '"]');
  if (sec) sec.classList.add('active');
  if (btn) btn.classList.add('active');
}

function calculate() {
  const { monthlyQueries, avgTokensPerQuery, whPerQuery, semanticCacheHit, routingEfficiency, egressReduction } = state;
  const totalQueriesMonth = monthlyQueries * 1e6;
  const totalWhMonth = totalQueriesMonth * whPerQuery;
  const tokensPerWh_baseline = avgTokensPerQuery / whPerQuery;

  // Thermodynamics
  const entropyReductionFactor = Math.log(15) / Math.log(3);
  const cacheEnergyReduction = semanticCacheHit / 100;
  const routingFactor = routingEfficiency / 100;
  const egressFactor = egressReduction / 100;
  const totalEfficiencyGain = cacheEnergyReduction +
    (1 - cacheEnergyReduction) * routingFactor +
    (1 - cacheEnergyReduction) * (1 - routingFactor) * egressFactor;

  // Quantum
  const quantumLeakageFactor = 0.15;
  const edgeDistributionFactor = 0.92;
  const whPerQuery_quantumCorrected = whPerQuery * (1 - quantumLeakageFactor * (1 - edgeDistributionFactor));
  const whPerQuery_withLayer = whPerQuery_quantumCorrected * (1 - totalEfficiencyGain);
  const tokensPerWh_withLayer = avgTokensPerQuery / whPerQuery_withLayer;
  const improvementPercent = ((tokensPerWh_withLayer - tokensPerWh_baseline) / tokensPerWh_baseline) * 100;

  const energySavedWhMonth = totalWhMonth * totalEfficiencyGain;
  const costSavedYear = energySavedWhMonth / 1000 * 0.09 * 12;

  return {
    tokensPerWh_baseline: Math.round(tokensPerWh_baseline),
    tokensPerWh_withLayer: Math.round(tokensPerWh_withLayer),
    improvementPercent: improvementPercent.toFixed(1),
    totalEfficiencyGain: (totalEfficiencyGain * 100).toFixed(1),
    costSavedYear: costSavedYear.toLocaleString('en-US', {style:'currency', currency:'USD', maximumFractionDigits:0}),
    entropyReductionFactor: entropyReductionFactor.toFixed(3),
    quantumLeakageFactor: (quantumLeakageFactor * 100).toFixed(1),
    trace: {
      cacheEnergyReduction: (cacheEnergyReduction * 100).toFixed(1),
      routingFactor: (routingFactor * 100).toFixed(1),
      egressFactor: (egressFactor * 100).toFixed(1),
      whPerQuery_baseline: whPerQuery.toFixed(3),
      whPerQuery_quantumCorrected: whPerQuery_quantumCorrected.toFixed(3),
      whPerQuery_withLayer: whPerQuery_withLayer.toFixed(3)
    }
  };
}

  const r = calculate();
  const { monthlyQueries, avgTokensPerQuery, whPerQuery, semanticCacheHit, routingEfficiency, egressReduction } = state;

  document.getElementById('root').innerHTML = `

    </section>

    <section id="sec-equations" class="section">
      <h2><span class="accent">Governing Equations</span> — Thermodynamics + Quantum Mechanics</h2>
      <p class="desc">The simulator algorithm is grounded in real physics — not marketing abstractions. Every efficiency lever maps to a specific physical mechanism.</p>

      <div class="eq-box">
        <div class="eq-label">Second Law of Thermodynamics · Entropy</div>

      </div>

      <div class="eq-box">
        <div class="eq-label">Energy Conservation · First Law</div>
        <div class="eq"><span class="var">E<sub>query</sub></span> = <span class="var">N<sub>FLOPs</sub></span> × <span class="var">E<sub>FLOP</sub></span>  <span class="comment">// Total energy = operations × energy/op</span></div>
        <div class="eq">Semantic caching: <span class="var">N<sub>FLOPs</sub></span> → 0 for cache hits  <span class="comment">// direct elimination</span></div>
        <div class="eq">Energy saved = <span class="result">(cache hit rate) × E<sub>query</sub></span></div>

      <div class="eq-box">
        <div class="eq-label">Quantum Tunneling · Heisenberg Uncertainty</div>
        <div class="eq"><span class="var">ΔE</span> · <span class="var">Δt</span> ≥ <span class="var">ħ</span> / 2  <span class="comment">// ħ = 1.054×10⁻³⁴ J·s</span></div>
        <div class="eq">At 4nm feature size, WKB tunneling probability:</div>
        <div class="eq"><span class="var">T</span> ≈ exp(−2α<span class="var">d</span>)  <span class="comment">// d = barrier width</span></div>
        <div class="eq">Leakage power ∝ <span class="result">15% of switching energy @ 4nm</span>  <span class="comment">// GB200 Blackwell</span></div>

      </div>

      <div class="eq-box">
        <div class="eq-label">Tokens Per Watt · Final Efficiency Metric</div>

        <div class="eq">Improvement:           <span class="result">Δη = +${r.improvementPercent}%</span></div>

      <div class="info-box">
        <strong>Why this matters:</strong> The tokens/watt/user metric is not arbitrary — it is the direct expression of thermodynamic efficiency in AI inference. Every watt consumed generates heat that must be dissipated. Every token delivered represents useful work extracted from that energy. The convergence layer does not add new energy; it stops wasting energy already consumed by eliminating coordination entropy and quantum leakage losses.

      state[sliderMap[id]] = parseFloat(e.target.value);
